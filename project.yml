name: Luna
options:
  bundleIdPrefix: com.luma
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.2"
  defaultConfig: Release

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.1"
  LaTeXSwiftUI:
    url: https://github.com/colinc86/LaTeXSwiftUI
    from: "1.5.0"

configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig

targets:
  Luma:
    type: application
    platform: macOS
    sources:
      - path: Luna
    settings:
      base:
        PRODUCT_NAME: Luna
        PRODUCT_BUNDLE_IDENTIFIER: com.luna.browser
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Luna/Luna.entitlements
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        COMBINE_HIDPI_IMAGES: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Luna
        INFOPLIST_KEY_CFBundleName: Luna
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSBluetoothWhileInUseUsageDescription: "Luna needs Bluetooth access for compatible devices."
        INFOPLIST_KEY_NSCameraUsageDescription: "Luna needs camera access for websites that request it."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Luna needs microphone access for websites that request it."
        INFOPLIST_KEY_NSDownloadsFolderUsageDescription: "Luna needs access to Downloads to save files."
        ENABLE_APP_SANDBOX: YES
        ENABLE_INCOMING_NETWORK_CONNECTIONS: NO # TODO: Enable this when we have a way to handle incoming network connections
        ENABLE_OUTGOING_NETWORK_CONNECTIONS: YES # TODO: Enable this when we have a way to handle outgoing network connections
        ENABLE_PREVIEWS: YES
        ENABLE_RESOURCE_ACCESS_AUDIO_INPUT: YES # TODO: Enable this when we have a way to handle audio input
        ENABLE_RESOURCE_ACCESS_BLUETOOTH: YES # TODO: Enable this when we have a way to handle bluetooth
        ENABLE_RESOURCE_ACCESS_CALENDARS: NO # TODO: Enable this when we have a way to handle calendars
        ENABLE_RESOURCE_ACCESS_CAMERA: YES # TODO: Enable this when we have a way to handle camera
        ENABLE_RESOURCE_ACCESS_CONTACTS: NO # TODO: Enable this when we have a way to handle contacts
        ENABLE_RESOURCE_ACCESS_LOCATION: NO # TODO: Enable this when we have a way to handle location
        ENABLE_RESOURCE_ACCESS_PRINTING: NO # TODO: Enable this when we have a way to handle printing
        ENABLE_RESOURCE_ACCESS_USB: YES # TODO: Enable this when we have a way to handle usb
        ENABLE_USER_SELECTED_FILES: readonly # TODO: Enable this when we have a way to handle user selected files
        PROVISIONING_PROFILE_SPECIFIER: ""
        CODE_SIGN_IDENTITY: "Apple Development"
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
    dependencies:
      - package: MarkdownUI
      - package: LaTeXSwiftUI
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
